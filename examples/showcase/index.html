<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#121312">
    <title>GameWeave / Physics Range</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="GameWeave 物理训练场"></canvas>
      <section id="loading" class="curtain" aria-live="polite">
        <div class="loading-copy"><span>GAMEWEAVE</span><h1>正在编织训练场</h1><p id="loading-state">准备资源</p></div>
        <div class="load-line"><i id="load-progress"></i></div>
      </section>
      <section id="error" class="curtain" hidden role="alert">
        <div class="loading-copy"><span>STARTUP ERROR</span><h1>训练场未能启动</h1><p id="error-message"></p><button id="retry" type="button">重新加载</button></div>
      </section>
      <header class="topbar">
        <div class="brand"><strong>GAMEWEAVE</strong><span>PHYSICS RANGE</span></div>
        <div class="runtime"><span id="runtime-state">INITIALIZING</span><b id="fps">0 FPS</b></div>
      </header>
      <aside class="telemetry" aria-label="运行状态">
        <div><span>目标</span><strong id="targets">0</strong></div>
        <div><span>弹药</span><strong id="ammo">12</strong></div>
        <div><span>碰撞事件</span><strong id="collisions">0</strong></div>
        <div><span>接地</span><strong id="grounded">NO</strong></div>
      </aside>
      <div class="crosshair" aria-hidden="true"><i></i><i></i></div>
      <div id="hit-marker" class="hit-marker" aria-hidden="true"></div>
      <footer class="controls">
        <p><kbd>WASD</kbd> 移动 <kbd>SHIFT</kbd> 冲刺 <kbd>SPACE</kbd> 跳跃</p>
        <p><kbd>MOUSE</kbd> 瞄准 <kbd>CLICK</kbd> 射击 <kbd>R</kbd> 重置靶场</p>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
