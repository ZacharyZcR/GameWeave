name: Publish npm packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:packages
      - name: Verify release version
        run: node scripts/verify-release.mjs "${{ github.event.release.tag_name }}"
      - run: node scripts/publish-packages.mjs --publish
        env:
          # Used only to bootstrap packages that do not yet have an npm trusted publisher.
          # OIDC is preferred automatically once trusted publishing is configured.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
