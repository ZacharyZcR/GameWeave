name: Bug report
description: Report a reproducible problem in a GameWeave package
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve GameWeave. Please provide a minimal reproduction.
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        [
          core,
          three,
          physics,
          character,
          combat,
          bots,
          i18n,
          ui,
          debug,
          cli,
          export-tauri,
          multiple packages,
        ]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link to a repository or include the smallest code sample that demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node.js, browser, operating system, renderer, and physics adapter versions when relevant.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: The reproduction does not contain credentials or private assets.
          required: true
